# Enable tmux mouse handling so the wheel scrolls pane history instead of
# sending cursor keys to the shell prompt.
set -g mouse on
# Copy through the attached terminal so remote tmux sessions can reach the
# local system clipboard over SSH/mosh when the terminal supports OSC 52.
set -s set-clipboard external

# Keep mouse selections visible after releasing the button instead of copying
# and immediately leaving copy-mode.
unbind -T copy-mode MouseDragEnd1Pane
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# Raspberry Pi hosts still use bash as the account login shell, but interactive
# work there should land in fish inside tmux. Leave other hosts on their normal
# login shell.
if-shell '[ -r /proc/device-tree/model ] && grep -qi "raspberry pi" /proc/device-tree/model && [ -x /usr/bin/fish ]' {
  set -gu default-command
  set -g default-shell /usr/bin/fish
}
