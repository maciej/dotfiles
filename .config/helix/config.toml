theme = "catppuccin_macchiato"

[editor]
# Use OSC 52 so yanking to the system clipboard works through SSH in Ghostty.
clipboard-provider = "termcode"

[editor.soft-wrap]
enable = true

[keys.normal]
# Print the current line's git blame information to the statusline.
A-S-b = ":echo %sh{git blame -L %{cursor_line},+1 %{buffer_name}}"

[keys.insert]
C-space = "completion"
